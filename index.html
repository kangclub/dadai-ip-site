<!DOCTYPE html>
<html>
<body>
    <h1>通路测试</h1>
    <button onclick="testList()">1. 测试列表接口</button>
    <p id="res1"></p>
    
    <hr>
    
    <input type="file" id="f">
    <button onclick="testUpload()">2. 测试上传接口</button>
    <p id="res2"></p>

    <script>
        // 注意：这里的路径必须是绝对路径，以防万一
        const API_LIST = '/api/list';
        const API_UPLOAD = '/api/upload';

        async function testList() {
            try {
                console.log("正在请求:", API_LIST);
                const res = await fetch(API_LIST);
                const text = await res.text(); // 先当文本拿，防止JSON解析失败
                console.log("原始返回:", text);
                
                document.getElementById('res1').innerText = "成功！返回: " + text;
            } catch (err) {
                console.error(err);
                document.getElementById('res1').innerText = "失败: " + err.message;
            }
        }

        async function testUpload() {
            const file = document.getElementById('f').files[0];
            if(!file) return alert("先选个文件");

            const form = new FormData();
            form.append('file', file);

            try {
                const res = await fetch(API_UPLOAD, { method: 'POST', body: form });
                const text = await res.text();
                document.getElementById('res2').innerText = "成功！返回: " + text;
            } catch (err) {
                console.error(err);
                document.getElementById('res2').innerText = "失败: " + err.message;
            }
        }
    </script>
</body>
</html>
