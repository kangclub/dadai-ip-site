<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>戴大爷测试页</title>
    <style>body { font-family: sans-serif; padding: 20px; }</style>
</head>
<body>
    <h1>戴大爷IP站 - 测试模式</h1>
    
    <h2>1. 上传测试</h2>
    <input type="file" id="fileInput" accept="image/png">
    <button onclick="uploadTest()">上传</button>
    <p id="uploadStatus"></p>

    <h2>2. 列表测试</h2>
    <button onclick="loadTest()">刷新列表</button>
    <ul id="imgList"></ul>

    <script>
        async function loadTest() {
            const res = await fetch('/api/list');
            const data = await res.json();
            console.log('列表数据:', data);
            
            const listEl = document.getElementById('imgList');
            listEl.innerHTML = '';
            
            if(data.blobs) {
                data.blobs.forEach(blob => {
                    const li = document.createElement('li');
                    li.innerHTML = `<a href="${blob.url}" target="_blank">${blob.pathname}</a>`;
                    listEl.appendChild(li);
                });
            }
        }

        async function uploadTest() {
            const file = document.getElementById('fileInput').files[0];
            if(!file) return alert('先选文件');

            const form = new FormData();
            form.append('file', file);

            const res = await fetch('/api/upload', { method: 'POST', body: form });
            const data = await res.json();
            console.log('上传结果:', data);
            document.getElementById('uploadStatus').innerText = data.success ? '成功！' : '失败：' + data.error;
            if(data.success) loadTest();
        }

        // 页面加载时自动刷一次
        loadTest();
    </script>
</body>
</html>
